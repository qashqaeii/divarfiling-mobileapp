name: Build Release APK

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: android

jobs:
  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon

  release:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Prepare google-services.json
        run: |
          if [ ! -f app/google-services.json ]; then
            if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
              echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json
            else
              echo "::error::app/google-services.json missing. Commit it or set GOOGLE_SERVICES_JSON secret."
              exit 1
            fi
          fi

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Missing secret: ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > divarfiling-release.keystore
          ls -la divarfiling-release.keystore

      - name: Run release lint
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/divarfiling-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew lintRelease --no-daemon

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/divarfiling-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Read version info
        id: version
        run: |
          VERSION_NAME=$(grep versionName app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep versionCode app/build.gradle.kts | head -1 | sed 's/.*= //' | tr -d ' ')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Rename release APK
        run: |
          mkdir -p release-output
          cp app/build/outputs/apk/release/app-release.apk \
            "release-output/divar-filing-v${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}-release.apk"

      - name: Verify APK signature
        run: |
          APK="release-output/divar-filing-v${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}-release.apk"
          APKSIGNER="${ANDROID_HOME}/build-tools/35.0.0/apksigner"
          if [ ! -x "$APKSIGNER" ]; then
            APKSIGNER="$(find "${ANDROID_HOME}/build-tools" -name apksigner -type f | sort -V | tail -1)"
          fi
          if [ -z "$APKSIGNER" ] || [ ! -x "$APKSIGNER" ]; then
            echo "::error::apksigner not found under ${ANDROID_HOME}/build-tools"
            exit 1
          fi
          "$APKSIGNER" verify --verbose --print-certs "$APK"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: divar-filing-v${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}-release
          path: android/release-output/*.apk
          if-no-files-found: error
          retention-days: 90
